<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskMaster - Kanban Board</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Ambient background glow elements -->
  <div class="glow-bg">
    <div class="glow-blob glow-blob-1"></div>
    <div class="glow-blob glow-blob-2"></div>
    <div class="glow-blob glow-blob-3"></div>
  </div>

  <div class="app-container">
    <header class="app-header">
      <!-- macOS traffic lights Window Controls -->
      <div class="window-controls">
        <span class="control-dot dot-close" title="Close"></span>
        <span class="control-dot dot-minimize" title="Minimize"></span>
        <span class="control-dot dot-maximize" title="Maximize"></span>
      </div>

      <div class="logo-container">
        <svg class="logo-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
          <rect x="7" y="7" width="3" height="9"/>
          <rect x="14" y="7" width="3" height="5"/>
        </svg>
        <h1>Task<span>Master</span></h1>
      </div>
      <button id="add-task-btn" class="btn btn-primary">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
        <span>Add Task</span>
      </button>
    </header>

    <main class="board-container">
      <!-- Column: To Do -->
      <section class="board-column" data-status="TO_DO">
        <div class="column-header">
          <div class="column-title-group">
            <span class="column-indicator indicator-todo"></span>
            <h2>To Do</h2>
          </div>
          <span class="task-count" id="count-todo">0</span>
        </div>
        <div class="task-list" id="list-todo" data-status="TO_DO">
          <!-- Task cards will be rendered here dynamically -->
        </div>
      </section>

      <!-- Column: In Progress -->
      <section class="board-column" data-status="IN_PROGRESS">
        <div class="column-header">
          <div class="column-title-group">
            <span class="column-indicator indicator-progress"></span>
            <h2>In Progress</h2>
          </div>
          <span class="task-count" id="count-progress">0</span>
        </div>
        <div class="task-list" id="list-progress" data-status="IN_PROGRESS">
          <!-- Task cards will be rendered here dynamically -->
        </div>
      </section>

      <!-- Column: Completed -->
      <section class="board-column" data-status="COMPLETED">
        <div class="column-header">
          <div class="column-title-group">
            <span class="column-indicator indicator-completed"></span>
            <h2>Completed</h2>
          </div>
          <div class="column-actions">
            <button id="clear-completed-btn" class="btn-clear-column" title="Clear all completed tasks">Clear All</button>
            <span class="task-count" id="count-completed">0</span>
          </div>
        </div>
        <div class="task-list" id="list-completed" data-status="COMPLETED">
          <!-- Task cards will be rendered here dynamically -->
        </div>
      </section>
    </main>

    <footer class="app-footer">
      <p>created by <span>Roopesh</span></p>
    </footer>
  </div>

  <!-- Task Creation Modal (iOS Sheet Layout) -->
  <div id="task-modal" class="modal-overlay hidden">
    <div class="modal-card">
      <!-- iOS drag/grab handlebar indicator -->
      <div class="sheet-grab-bar"></div>
      
      <div class="modal-header">
        <h2>New Task</h2>
        <button id="close-modal-btn" class="btn-close" aria-label="Close modal">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <form id="task-form">
        <div class="form-group">
          <label for="task-title">Task Title</label>
          <input type="text" id="task-title" required placeholder="What needs to be done?" maxlength="100">
        </div>
        <div class="form-group">
          <label for="task-desc">Description</label>
          <textarea id="task-desc" placeholder="Add some details about this task..." rows="4" maxlength="500"></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="task-date">Due Date</label>
            <input type="date" id="task-date" required>
          </div>
          <div class="form-group">
            <label for="task-time">Time</label>
            <input type="time" id="task-time">
          </div>
        </div>
        <div class="form-actions">
          <button type="button" id="cancel-task-btn" class="btn btn-secondary">Cancel</button>
          <button type="submit" class="btn btn-primary">Create Task</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Toast Notification Container -->
  <div id="toast-container" class="toast-container"></div>

  <script src="app.js"></script>
</body>
</html>
